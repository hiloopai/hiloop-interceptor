[graph]
all-features = true

[advisories]
unmaintained = "workspace"
unsound = "workspace"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []
skip = []
skip-tree = []

[licenses]
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  # BSD-3-Clause / ISC / MIT-0: permissive licenses pulled in by the proxy TLS
  # stack (aws-lc-rs, aws-lc-sys, rustls-webpki). All compatible with our
  # MIT/Apache-2.0 distribution.
  "BSD-3-Clause",
  # CDLA-Permissive-2.0: the permissive data license on webpki-roots (the
  # Mozilla CA bundle the proxy trusts for upstream connections).
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MIT-0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
