version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps(ci)
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: rust-toolchain
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rust-toolchain:
        patterns:
          - "*"
