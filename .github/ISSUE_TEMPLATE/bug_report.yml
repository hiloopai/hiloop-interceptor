name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please don't include secrets, API keys, or captured
        request/response bodies in this report. For security vulnerabilities, see
        [SECURITY.md](../../SECURITY.md) instead of opening a public issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) you ran and what the wrapped harness was.
      placeholder: |
        cargo run -p hiloop-interceptor -- run --proxy --events-jsonl ./events.jsonl -- <command>
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `hiloop-interceptor --version`, or the git commit you built from.
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS and architecture (e.g. macOS 15 arm64, Ubuntu 24.04 x86_64).
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Any error output. This will be rendered as code, so no backticks needed.
      render: shell
