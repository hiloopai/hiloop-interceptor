[package]
name = "hiloop-interceptor"
version = "0.0.0"
description = "Interception wrapper for agent harnesses: captures OTEL/logs/network telemetry and tags it with fork-tree identity."
edition.workspace = true
license.workspace = true
rust-version.workspace = true
readme = "../../README.md"
documentation = "https://docs.rs/hiloop-interceptor"
keywords = ["observability", "ai-agents", "opentelemetry", "sandbox", "tracing"]
categories = ["command-line-utilities", "development-tools"]

[[bin]]
name = "hiloop-interceptor"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
base64.workspace = true
bytes.workspace = true
clap.workspace = true
futures-core.workspace = true
futures-util.workspace = true
hiloop-core.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
tokio-stream.workspace = true

[dev-dependencies]
tempfile.workspace = true

[features]
test-support = []

[lints]
workspace = true
